{# Shared NEX-GDDP ensemble controls. Requires a source <select id="source-select">
   earlier in the form. Shown only when NEX-GDDP is selected. #}
<div id="ensemble-options" class="bg-white p-6 rounded-lg shadow" style="display:none">
    <h2 class="text-lg font-semibold mb-1">NEX-GDDP Ensemble Options</h2>
    <p class="text-xs text-gray-500 mb-4">Applied only when the data source is NEX-GDDP. Results are aggregated across the selected CMIP6 models for the chosen scenario.</p>
    <label class="block text-sm font-medium text-gray-700 mb-1">Scenario</label>
    <select name="scenario"
        class="w-full px-3 py-2 border border-gray-300 rounded-md mb-4 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
        {% for sc in SCENARIOS %}
        <option value="{{ sc }}">{{ sc }}</option>
        {% endfor %}
    </select>
    <label class="block text-sm font-medium text-gray-700 mb-1">Models <span class="text-gray-400">(none selected = all)</span></label>
    <div class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto border border-gray-200 rounded-md p-3">
        {% for mdl in MODELS %}
        <label class="flex items-center space-x-2">
            <input type="checkbox" name="models" value="{{ mdl }}" class="rounded text-primary focus:ring-primary">
            <span class="text-xs">{{ mdl }}</span>
        </label>
        {% endfor %}
    </div>
</div>
<script>
(function () {
    const src = document.getElementById('source-select');
    const opts = document.getElementById('ensemble-options');
    function sync() { opts.style.display = (src.value === 'nex_gddp') ? 'block' : 'none'; }
    if (src && opts) { src.addEventListener('change', sync); sync(); }
})();
</script>
